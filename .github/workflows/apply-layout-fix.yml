name: Apply responsive portfolio fix
on:
  push:
    paths:
      - .github/workflows/apply-layout-fix.yml
permissions:
  contents: write
jobs:
  fix-layout:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Add responsive safeguards
        env:
          FIX_B64: 
        run: |
          python -c "import os,base64; open('index.html','ab').write(base64.b64decode(os.environ['FIX_B64']))"
          git config user.name github-actions
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add index.html
          git commit -m "Fix responsive portfolio layout"
          git push
