name: Apply Aura page fit fix
on:
  push:
    paths:
      - .github/workflows/apply-layout-fix.yml
permissions:
  contents: write
jobs:
  fix-aura:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Fit Aura hero image
        env:
          FIX_B64: PHN0eWxlPi8qIEF1cmEgZnVsbC1pbWFnZSBmaXQgKi8jYXVyYXtiYWNrZ3JvdW5kLXNpemU6Y29udGFpbiFpbXBvcnRhbnQ7YmFja2dyb3VuZC1wb3NpdGlvbjpjZW50ZXIhaW1wb3J0YW50O2JhY2tncm91bmQtcmVwZWF0Om5vLXJlcGVhdCFpbXBvcnRhbnQ7YmFja2dyb3VuZC1jb2xvcjojYmM4ZThjIWltcG9ydGFudH08L3N0eWxlPg==
        run: |
          python -c "import os,base64; open('index.html','ab').write(base64.b64decode(os.environ['FIX_B64']))"
          git config user.name github-actions
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add index.html
          git commit -m "Show full Aura hero image"
          git push
